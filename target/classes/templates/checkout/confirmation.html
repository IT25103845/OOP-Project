<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Confirmation - FreshMart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" th:href="@{/}">Fresh<span>Mart</span> 💳</a>
    <ul class="navbar-nav ms-auto">
      <li class="nav-item"><a class="nav-link" th:href="@{/checkout}">Checkout</a></li>
      <li class="nav-item"><a class="nav-link" th:href="@{/cart}">Cart</a></li>
      <li class="nav-item"><a class="nav-link" th:href="@{/logout}">Logout</a></li>
    </ul>
  </div>
</nav>

<div class="container py-5">
  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div class="fresh-card p-5">
    <div class="text-center mb-4">
      <div style="font-size:3rem">✅</div>
      <h1>Payment & Checkout Complete</h1>
      <p class="lead">Your order has been confirmed instantly.</p>
    </div>

    <div class="row g-4">
      <div class="col-md-6">
        <h5>Order Details</h5>
        <p><strong>Order ID:</strong> <span th:text="${order.id}"></span></p>
        <p><strong>Status:</strong> <span class="badge bg-success" th:text="${order.status}"></span></p>
        <p><strong>Customer:</strong> <span th:text="${order.userName}"></span></p>
        <p><strong>Delivery Address:</strong> <span th:text="${order.deliveryAddress}"></span></p>
        <p><strong>Created:</strong> <span th:text="${order.createdAt}"></span></p>
      </div>
      <div class="col-md-6">
        <h5>Paid Items</h5>
        <div th:each="item : ${order.items}" class="d-flex justify-content-between border-bottom py-2">
          <span><span th:text="${item.productName}"></span> x<span th:text="${item.quantity}"></span></span>
          <strong th:text="${item.formattedSubtotal}"></strong>
        </div>
        <div class="d-flex justify-content-between pt-3 fs-5">
          <strong>Total</strong>
          <strong th:text="${order.formattedTotal}"></strong>
        </div>
      </div>
    </div>

    <div class="text-center mt-4">
      <a th:href="@{/checkout}" class="btn-fresh">Back to Checkout</a>
    </div>
  </div>
</div>
</body>
</html>
