<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management - FreshMart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" th:href="@{/products}">Fresh<span>Mart</span> 🥦</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" th:href="@{/products}">Product List</a></li>
        <li class="nav-item"><a class="nav-link active" th:href="@{/products/admin}">Admin CRUD</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="container d-flex justify-content-between align-items-center">
    <h2>🥦 Product Management - Admin CRUD</h2>
    <button class="btn-amber" data-bs-toggle="modal" data-bs-target="#addProductModal">
      + Add Product
    </button>
  </div>
</div>

<div class="container pb-5">
  <div th:if="${success}" class="alert-fresh-success mb-3 auto-dismiss" th:text="${success}"></div>
  <div th:if="${error}" class="alert-fresh-error mb-3 auto-dismiss" th:text="${error}"></div>

  <!-- Products Table -->
  <div style="overflow-x:auto">
    <table class="table-fresh">
      <thead>
        <tr>
          <th>Emoji</th>
          <th>Name</th>
          <th>Category</th>
          <th>Price</th>
          <th>Stock</th>
          <th>Added</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="p : ${products}">
          <td style="font-size:2rem;text-align:center" th:text="${p.imageEmoji}"></td>
          <td><strong th:text="${p.name}"></strong><br>
              <small class="text-muted" th:text="${p.description}"></small></td>
          <td><span class="product-category" th:text="${p.category}"></span></td>
          <td><strong th:text="${p.formattedPrice}"></strong></td>
          <td>
            <span th:classappend="${p.stock < 10 ? ' stock-low' : ' stock-ok'}"
                  th:text="${p.stock}"></span>
          </td>
          <td th:text="${p.createdAt}" style="font-size:.82rem;color:var(--text-light)"></td>
          <td>
            <button class="btn-fresh-outline edit-product-btn"
                    style="font-size:.8rem;padding:.3rem .8rem;margin-right:.3rem"
                    th:data-id="${p.id}"
                    th:data-name="${p.name}"
                    th:data-category="${p.category}"
                    th:data-price="${p.price}"
                    th:data-stock="${p.stock}"
                    th:data-description="${p.description}"
                    th:data-emoji="${p.imageEmoji}">
              Edit
            </button>
            <form th:action="@{/products/admin/delete/{id}(id=${p.id})}" method="post" style="display:inline"
                  onsubmit="return confirmDelete('Delete this product?')">
              <button type="submit" class="btn-danger-soft">Delete</button>
            </form>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(products)}">
          <td colspan="7" class="text-center text-muted py-4">No products yet. Add one!</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Add Product Modal -->
<div class="modal fade" id="addProductModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content" style="border-radius:var(--radius-lg);border:none">
      <div class="modal-header" style="background:var(--green-dark);border-radius:var(--radius-lg) var(--radius-lg) 0 0">
        <h5 class="modal-title" style="color:white;font-family:'Fraunces',serif">Add New Product</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <form th:action="@{/products/admin/add}" method="post">
        <div class="modal-body p-4">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label">Product Name</label>
              <input type="text" name="name" class="form-control" placeholder="e.g. Basmati Rice (5kg)" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Category</label>
              <input type="text" name="category" class="form-control" placeholder="e.g. Grains" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Emoji Icon</label>
              <input type="text" name="imageEmoji" class="form-control" placeholder="e.g. 🌾" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Price ($)</label>
              <input type="number" name="price" class="form-control" step="0.01" min="0.01" placeholder="0.00" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Stock Quantity</label>
              <input type="number" name="stock" class="form-control" min="0" placeholder="100" required>
            </div>
            <div class="col-12">
              <label class="form-label">Description</label>
              <textarea name="description" class="form-control" rows="2" placeholder="Brief product description"></textarea>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-fresh-outline" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn-fresh">Add Product</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Edit Product Modal -->
<div class="modal fade" id="editProductModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content" style="border-radius:var(--radius-lg);border:none">
      <div class="modal-header" style="background:var(--green-mid);border-radius:var(--radius-lg) var(--radius-lg) 0 0">
        <h5 class="modal-title" style="color:white;font-family:'Fraunces',serif">Edit Product</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <form id="editForm" method="post">
        <input type="hidden" id="editId" name="editId">
        <div class="modal-body p-4">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label">Product Name</label>
              <input type="text" id="editName" name="name" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Category</label>
              <input type="text" id="editCategory" name="category" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Emoji Icon</label>
              <input type="text" id="editEmoji" name="imageEmoji" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Price ($)</label>
              <input type="number" id="editPrice" name="price" class="form-control" step="0.01" min="0.01" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Stock</label>
              <input type="number" id="editStock" name="stock" class="form-control" min="0" required>
            </div>
            <div class="col-12">
              <label class="form-label">Description</label>
              <textarea id="editDescription" name="description" class="form-control" rows="2"></textarea>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-fresh-outline" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn-fresh">Save Changes</button>
        </div>
      </form>
    </div>
  </div>
</div>

<footer><strong>FreshMart Product Management</strong> 🛡️</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
<script>
  // Wire up edit buttons - set form fields AND action immediately on click
  document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.edit-product-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var id = btn.getAttribute('data-id');
        document.getElementById('editId').value          = id;
        document.getElementById('editName').value        = btn.getAttribute('data-name');
        document.getElementById('editCategory').value    = btn.getAttribute('data-category');
        document.getElementById('editPrice').value       = btn.getAttribute('data-price');
        document.getElementById('editStock').value       = btn.getAttribute('data-stock');
        document.getElementById('editDescription').value = btn.getAttribute('data-description');
        document.getElementById('editEmoji').value       = btn.getAttribute('data-emoji');
        // Set form action directly here - no dependency on modal events
        document.getElementById('editForm').action = '/products/admin/update/' + id;
        var modal = new bootstrap.Modal(document.getElementById('editProductModal'));
        modal.show();
      });
    });
  });
</script>
</body>
</html>
