<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product != null ? product.name : 'Product'} + ' - FreshMart'">Product - FreshMart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" th:href="@{/products}">Fresh<span>Mart</span> 🥦</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" th:href="@{/products}">Product List</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/products/admin}">Admin CRUD</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container py-4" th:if="${product}">
  <a th:href="@{/products}" style="color:var(--green);text-decoration:none;font-size:.9rem">← Back to Products</a>

  <div class="row g-4 mt-1">
    <div class="col-md-4 text-center">
      <div class="product-img-wrap" style="border-radius:var(--radius-lg);font-size:8rem;padding:3rem">
        <span th:text="${product.imageEmoji}"></span>
      </div>
    </div>
    <div class="col-md-8">
      <div class="form-card">
        <span class="product-category" th:text="${product.category}"></span>
        <h2 style="font-family:'Fraunces',serif;color:var(--green-dark);margin:.5rem 0" th:text="${product.name}"></h2>
        <p th:text="${product.description}" style="color:var(--text-mid)"></p>

        <div class="d-flex align-items-baseline gap-3 mb-3">
          <span class="product-price" th:text="${product.formattedPrice}"></span>
          <span th:classappend="${product.stock < 10 ? ' stock-low' : ' stock-ok'}" class="product-stock"
                th:text="'Stock: ' + ${product.stock}"></span>
        </div>

        <p><strong>Created At:</strong> <span th:text="${product.createdAt}"></span></p>
        <a th:href="@{/products/admin}" class="btn-amber">Manage Products</a>
      </div>
    </div>
  </div>
</div>

<div th:unless="${product}" class="empty-state container">
  <div class="empty-icon">❌</div>
  <h3>Product Not Found</h3>
  <a th:href="@{/products}" class="btn-fresh">Back to Products</a>
</div>

<footer><strong>FreshMart</strong> 🥦 Component 2: Product Management</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
