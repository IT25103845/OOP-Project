<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cart Support - Payment & Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" th:href="@{/}">Fresh<span>Mart</span> 💳</a>
    <ul class="navbar-nav ms-auto">
      <li class="nav-item"><a class="nav-link" th:href="@{/checkout}">Checkout</a></li>
      <li class="nav-item"><a class="nav-link" th:href="@{/logout}">Logout</a></li>
    </ul>
  </div>
</nav>

<div class="container py-5">
  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

  <div class="fresh-card p-4 mb-4">
    <h2>Cart Support</h2>
    <p class="text-muted">This page is included only to support Component 5 checkout testing.</p>

    <div th:if="${cart != null and !cart.items.isEmpty()}">
      <table class="table align-middle">
        <thead><tr><th>Product</th><th>Qty</th><th class="text-end">Subtotal</th></tr></thead>
        <tbody>
          <tr th:each="item : ${cart.items}">
            <td th:text="${item.productName}"></td>
            <td th:text="${item.quantity}"></td>
            <td class="text-end" th:text="${item.formattedSubtotal}"></td>
          </tr>
        </tbody>
        <tfoot>
          <tr><th colspan="2">Total</th><th class="text-end" th:text="${cart.formattedTotal}"></th></tr>
        </tfoot>
      </table>
      <a th:href="@{/checkout}" class="btn-amber">Proceed to Checkout</a>
    </div>

    <div th:if="${cart == null or cart.items.isEmpty()}" class="text-center py-4">
      <p>Your cart is empty.</p>
      <form th:action="@{/cart/demo-fill}" method="post">
        <button class="btn-fresh" type="submit">Load Demo Cart</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
