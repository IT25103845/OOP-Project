<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management – FreshMart Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" th:href="@{/}">Fresh<span>Mart</span> 🛡️</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" th:href="@{/}">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link active" th:href="@{/admin/users}">Users</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/logout}">Logout</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="container">
    <h2>👥 User Management</h2>
  </div>
</div>

<div class="container pb-5">
  <div th:if="${success}" class="alert-fresh-success mb-3 auto-dismiss" th:text="${success}"></div>

  <!-- Search -->
  <div class="form-card mb-4" style="padding:1.2rem">
    <form th:action="@{/admin/users}" method="get" class="d-flex gap-2">
      <input type="text" name="search" id="searchInput" class="form-control"
             placeholder="Search by name or email..." th:value="${search}">
      <button type="submit" class="btn-fresh" style="white-space:nowrap">Search</button>
      <a th:href="@{/admin/users}" class="btn-fresh-outline" style="white-space:nowrap">Clear</a>
    </form>
  </div>

  <div style="overflow-x:auto">
    <table class="table-fresh">
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Role</th>
          <th>Joined</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="u : ${users}">
          <td th:text="${u.id}"></td>
          <td><strong th:text="${u.name}"></strong></td>
          <td th:text="${u.email}"></td>
          <td th:text="${u.phone}"></td>
          <td>
            <span th:if="${u.admin}" style="background:var(--amber);padding:3px 10px;border-radius:15px;font-size:.75rem;font-weight:700;">ADMIN</span>
            <span th:unless="${u.admin}" class="badge-fresh badge-delivered">CUSTOMER</span>
          </td>
          <td th:text="${u.createdAt}"></td>
          <td>
            <form th:unless="${u.admin}" th:action="@{/admin/users/delete/{id}(id=${u.id})}" method="post"
                  onsubmit="return confirmDelete('Delete this user?')">
              <button type="submit" class="btn-danger-soft">Delete</button>
            </form>
            <span th:if="${u.admin}" class="text-muted" style="font-size:.8rem">—</span>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(users)}">
          <td colspan="7" class="text-center text-muted py-4">No users found.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<footer><strong>FreshMart Admin</strong> 🛡️</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
