<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – FreshMart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-page">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">

        <div class="auth-logo">
          <div class="leaf">🌿</div>
          <h1>Fresh<span>Mart</span></h1>
          <p class="text-muted">Create your account</p>
        </div>

        <div th:if="${error}" class="alert-fresh-error mb-3 auto-dismiss" th:text="${error}"></div>

        <div class="form-card">
          <h3 class="mb-1" style="color:var(--green-dark)">Join FreshMart</h3>
          <p class="text-muted mb-4" style="font-size:.9rem">Fresh groceries delivered to your door</p>

          <form th:action="@{/register}" method="post">
            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input type="text" name="name" class="form-control"
                     placeholder="Your full name" required autofocus>
            </div>
            <div class="mb-3">
              <label class="form-label">Email address</label>
              <input type="email" name="email" class="form-control"
                     placeholder="you@email.com" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Phone Number</label>
              <input type="tel" name="phone" class="form-control"
                     placeholder="+1 234 567 8900">
            </div>
            <div class="mb-4">
              <label class="form-label">Password</label>
              <input type="password" name="password" class="form-control"
                     placeholder="At least 6 characters" required minlength="6">
            </div>
            <button type="submit" class="btn-amber w-100 text-center" style="font-size:1rem;padding:.75rem">
              Create Account
            </button>
          </form>

          <hr class="my-3">
          <p class="text-center text-muted" style="font-size:.9rem">
            Already have an account?
            <a th:href="@{/login}" style="color:var(--green);font-weight:600">Sign in</a>
          </p>
        </div>

      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
