<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders – FreshMart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" th:href="@{/}">Fresh<span>Mart</span> 🌿</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon" style="filter:invert(1)"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link active" th:href="@{/orders}">📦 Orders</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/profile}">👤 Profile</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/logout}">Logout</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="container">
    <h2>📦 My Orders</h2>
    <p class="text-muted mb-0">Track and manage your orders</p>
  </div>
</div>

<div class="container pb-5">
  <div th:if="${success}" class="alert-fresh-success mb-3 auto-dismiss" th:text="${success}"></div>
  <div th:if="${error}" class="alert-fresh-error mb-3 auto-dismiss" th:text="${error}"></div>

  <!-- Orders List -->
  <div th:if="${not #lists.isEmpty(orders)}">
    <div th:each="order : ${orders}">
      <div class="order-card">
        <div class="row align-items-center">
          <div class="col-md-3">
            <div class="order-id">Order #<span th:text="${order.id}"></span></div>
            <div style="font-size:.82rem;color:var(--text-light)" th:text="${order.createdAt}"></div>
          </div>
          <div class="col-md-3">
            <span class="badge-fresh"
                  th:classappend="${order.statusBadgeClass}"
                  th:text="${order.status}"></span>
          </div>
          <div class="col-md-3">
            <span style="font-family:'Fraunces',serif;font-size:1.2rem;font-weight:900;color:var(--green-dark)"
                  th:text="${order.formattedTotal}"></span>
            <div style="font-size:.8rem;color:var(--text-light)">
              <span th:text="${#lists.size(order.items)}"></span> item(s)
            </div>
          </div>
          <div class="col-md-3 d-flex gap-2 justify-content-md-end mt-2 mt-md-0">
            <a th:href="@{/orders/{id}(id=${order.id})}" class="btn-fresh-outline"
               style="font-size:.85rem;padding:.4rem .9rem">View Details</a>
            <form th:if="${order.status != 'CANCELLED' and order.status != 'DELIVERED'}"
                  th:action="@{/orders/cancel/{id}(id=${order.id})}" method="post">
              <button type="submit" class="btn-danger-soft"
                      onclick="return confirmDelete('Cancel this order?')">Cancel</button>
            </form>
          </div>
        </div>

        <!-- Item preview -->
        <div style="margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--border);font-size:.83rem;color:var(--text-light)">
          📍 <span th:text="${order.deliveryAddress}"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- Empty State -->
  <div th:if="${#lists.isEmpty(orders)}" class="empty-state">
    <div class="empty-icon">📦</div>
    <h3>No Orders Yet</h3>
    <p>You haven't placed any orders. Start shopping!</p>
    <a th:href="@{/orders}" class="btn-fresh">Refresh Orders</a>
  </div>
</div>

<footer>
  <strong>FreshMart</strong> 🌿 Fresh groceries, delivered with care.
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
