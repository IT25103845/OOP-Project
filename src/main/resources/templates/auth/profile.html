<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile – FreshMart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" th:href="@{/}">Fresh<span>Mart</span> 🌿</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon" style="filter:invert(1)"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link active" th:href="@{/profile}">👤 Profile</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/logout}">Logout</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Page Header -->
<div class="page-header">
  <div class="container">
    <h2>👤 My Account</h2>
    <p class="text-muted mb-0">Manage your personal details</p>
  </div>
</div>

<div class="container pb-5">
  <div th:if="${success}" class="alert-fresh-success mb-3 auto-dismiss" th:text="${success}"></div>
  <div th:if="${error}" class="alert-fresh-error mb-3 auto-dismiss" th:text="${error}"></div>

  <div class="row">
    <!-- Profile Summary Card -->
    <div class="col-md-4 mb-4">
      <div class="form-card text-center h-100">
        <div style="font-size:4rem;margin-bottom:1rem;">👤</div>
        <h4 th:text="${user.name}" style="font-family:'Fraunces',serif;color:var(--green-dark)"></h4>
        <p class="text-muted" th:text="${user.email}"></p>
        <span th:if="${user.admin}" style="background:var(--amber);padding:4px 12px;border-radius:20px;font-size:.8rem;font-weight:700;">
          ADMIN
        </span>
        <span th:unless="${user.admin}" style="background:var(--green-pale);color:var(--green-dark);padding:4px 12px;border-radius:20px;font-size:.8rem;font-weight:700;">
          CUSTOMER
        </span>
        <hr>
        <p style="font-size:.85rem;color:var(--text-light)">
          📞 <span th:text="${user.phone}"></span><br>
          📅 Member since <span th:text="${user.createdAt}"></span>
        </p>
      </div>
    </div>

    <!-- Edit Form -->
    <div class="col-md-8">
      <div class="form-card">
        <h4 class="mb-4" style="color:var(--green-dark);font-family:'Fraunces',serif">Edit Profile</h4>
        <form th:action="@{/profile/update}" method="post">
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" name="name" class="form-control"
                   th:value="${user.name}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email (cannot change)</label>
            <input type="email" class="form-control" th:value="${user.email}" disabled
                   style="background:#f5f5f5;cursor:not-allowed">
          </div>
          <div class="mb-3">
            <label class="form-label">Phone</label>
            <input type="tel" name="phone" class="form-control" th:value="${user.phone}">
          </div>
          <hr>
          <p class="text-muted" style="font-size:.85rem">Leave password blank to keep current password</p>
          <div class="mb-4">
            <label class="form-label">New Password</label>
            <input type="password" name="newPassword" class="form-control"
                   placeholder="New password (optional)" minlength="6">
          </div>
          <button type="submit" class="btn-fresh">Save Changes</button>
        </form>
      </div>
    </div>
  </div>
</div>

<footer>
  <strong>FreshMart</strong> 🌿 Component 1: User Authentication & Account Management
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
