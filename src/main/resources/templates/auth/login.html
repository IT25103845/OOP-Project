<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – FreshMart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-page">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">

        <!-- Logo -->
        <div class="auth-logo">
          <div class="leaf">🌿</div>
          <h1>Fresh<span>Mart</span></h1>
          <p class="text-muted">Your neighborhood online grocery</p>
        </div>

        <!-- Alerts -->
        <div th:if="${error}" class="alert-fresh-error mb-3 auto-dismiss" th:text="${error}"></div>
        <div th:if="${success}" class="alert-fresh-success mb-3 auto-dismiss" th:text="${success}"></div>

        <!-- Form Card -->
        <div class="form-card">
          <h3 class="mb-1" style="color:var(--green-dark)">Welcome back</h3>
          <p class="text-muted mb-4" style="font-size:.9rem">Sign in to your account</p>

          <form th:action="@{/login}" method="post">
            <div class="mb-3">
              <label class="form-label">Email address</label>
              <input type="email" name="email" class="form-control"
                     placeholder="you@email.com" required autofocus>
            </div>
            <div class="mb-4">
              <label class="form-label">Password</label>
              <input type="password" name="password" class="form-control"
                     placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-fresh w-100 text-center" style="font-size:1rem; padding:.75rem">
              Sign In
            </button>
          </form>

          <hr class="my-3">
          <p class="text-center text-muted" style="font-size:.9rem">
            Don't have an account?
            <a th:href="@{/register}" style="color:var(--green);font-weight:600">Register here</a>
          </p>

          <!-- Demo credentials hint -->
          <div style="background:var(--green-pale);border-radius:8px;padding:.75rem;font-size:.8rem;color:var(--green-dark);margin-top:1rem;">
            <strong>🔑 Demo Admin:</strong> admin@freshmart.com / admin123<br>
            <strong>👤 Demo User:</strong> john@email.com / pass123
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
