<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>FreshMart - Order Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" th:href="@{/}">Fresh<span>Mart</span> 📦</a>
    <ul class="navbar-nav ms-auto">
      <li class="nav-item"><a class="nav-link" th:href="@{/orders}">My Orders</a></li>
      <li class="nav-item"><a class="nav-link" th:href="@{/logout}">Logout</a></li>
    </ul>
  </div>
</nav>
<div class="container py-5">
  <div class="fresh-card p-5 text-center">
    <h1>Component 4: Order Management</h1>
    <p class="lead">Track orders, view order details, cancel active orders, and manage statuses as admin.</p>
    <a th:href="@{/orders}" class="btn-fresh">Open Orders</a>
    <a th:if="${user.admin}" th:href="@{/orders/admin}" class="btn-fresh-outline ms-2">Admin Orders</a>
  </div>
</div>
</body>
</html>
