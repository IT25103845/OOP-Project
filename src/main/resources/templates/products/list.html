<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management - FreshMart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" th:href="@{/products}">Fresh<span>Mart</span> 🥦</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon" style="filter:invert(1)"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link active" th:href="@{/products}">Product List</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/products/admin}">Admin CRUD</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="container">
    <h2>🥦 Product Management</h2>
    <p class="mb-0">Browse, search, and filter FreshMart grocery products.</p>
  </div>
</div>

<div class="container pb-5">
  <div th:if="${success}" class="alert-fresh-success mb-3 auto-dismiss" th:text="${success}"></div>
  <div th:if="${error}" class="alert-fresh-error mb-3 auto-dismiss" th:text="${error}"></div>

  <div class="row g-3 mb-4">
    <div class="col-md-6">
      <form th:action="@{/products}" method="get" class="d-flex gap-2">
        <input type="text" name="search" id="searchInput" class="form-control"
               placeholder="Search rice, sugar, milk..." th:value="${search}">
        <button type="submit" class="btn-fresh" style="white-space:nowrap">🔍 Search</button>
        <a th:href="@{/products}" th:if="${search != null}" class="btn-fresh-outline">Clear</a>
      </form>
    </div>
    <div class="col-md-6 d-flex flex-wrap align-items-center gap-1">
      <a th:href="@{/products}" th:classappend="${selectedCategory == null ? ' active' : ''}" class="category-pill">All</a>
      <a th:each="cat : ${categories}"
         th:href="@{/products(category=${cat})}"
         th:classappend="${selectedCategory == cat ? ' active' : ''}"
         th:text="${cat}"
         class="category-pill"></a>
    </div>
  </div>

  <div class="row g-4" th:if="${not #lists.isEmpty(products)}">
    <div class="col-sm-6 col-md-4 col-lg-3" th:each="product : ${products}">
      <div class="product-card">
        <a th:href="@{/products/{id}(id=${product.id})}" class="product-img-wrap text-decoration-none">
          <span th:text="${product.imageEmoji}" style="font-size:5rem"></span>
        </a>
        <div class="product-body">
          <div class="product-category" th:text="${product.category}"></div>
          <a th:href="@{/products/{id}(id=${product.id})}" class="product-name text-decoration-none" th:text="${product.name}"></a>
          <div class="product-description" th:text="${product.description}"></div>
          <div class="d-flex align-items-baseline mt-auto">
            <span class="product-price" th:text="${product.formattedPrice}"></span>
            <span class="product-stock"
                  th:classappend="${product.stock < 10 ? ' stock-low' : ' stock-ok'}"
                  th:text="'(' + ${product.stock} + ' left)'"></span>
          </div>
          <a th:href="@{/products/{id}(id=${product.id})}" class="btn-fresh-outline mt-2 text-center">View Details</a>
        </div>
      </div>
    </div>
  </div>

  <div th:if="${#lists.isEmpty(products)}" class="empty-state">
    <div class="empty-icon">🔍</div>
    <h3>No Products Found</h3>
    <p>Try a different search or category.</p>
    <a th:href="@{/products}" class="btn-fresh">Browse All</a>
  </div>
</div>

<footer><strong>FreshMart</strong> 🥦 Component 2: Product Management</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
